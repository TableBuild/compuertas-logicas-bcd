<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <!-- Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Decodificador BCD a 7 segmentos</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- ==================== TÍTULO ==================== -->
<h1>Decodificador BCD → 7 Segmentos</h1>
<p><strong>Tipo de display:</strong> Cátodo común (1 = encendido)</p>

<!-- ==================== SWITCHES ==================== -->
<div class="switches">
  <label>
    A
    <input type="checkbox" id="A">
  </label>

  <label>
    B
    <input type="checkbox" id="B">
  </label>

  <label>
    C
    <input type="checkbox" id="C">
  </label>

  <label>
    D
    <input type="checkbox" id="D">
  </label>
</div>

<!-- ==================== VALOR ==================== -->
<h2>Número: <span id="valor">0</span></h2>

<!-- ==================== DISPLAY ==================== -->
<div class="display">
  <div id="a" class="segment a"></div>
  <div id="b" class="segment b"></div>
  <div id="c" class="segment c"></div>
  <div id="d" class="segment d"></div>
  <div id="e" class="segment e"></div>
  <div id="f" class="segment f"></div>
  <div id="g" class="segment g"></div>
</div>

<!-- ==================== PANELES ==================== -->
<div class="paneles">

  <!-- ==================== TABLA DE LA VERDAD ==================== -->
  <div class="truth-box">
    <h2>Tabla de la Verdad BCD → 7 Segmentos</h2>

    <table id="truthTable">
      <thead>
        <tr>
          <th colspan="4">Entradas (BCD)</th>
          <th colspan="7">Salidas (Segmentos)</th>
        </tr>
        <tr>
          <th>A</th>
          <th>B</th>
          <th>C</th>
          <th>D</th>
          <th>a</th>
          <th>b</th>
          <th>c</th>
          <th>d</th>
          <th>e</th>
          <th>f</th>
          <th>g</th>
        </tr>
      </thead>
      <tbody>
        <!-- JS genera las filas -->
      </tbody>
    </table>
  </div>

  <!-- ==================== ECUACIONES ==================== -->
  <div class="ecuaciones">
    <h2>Ecuaciones Booleanas</h2>

    <pre id="eq-a"></pre>
    <pre id="eq-b"></pre>
    <pre id="eq-c"></pre>
    <pre id="eq-d"></pre>
    <pre id="eq-e"></pre>
    <pre id="eq-f"></pre>
    <pre id="eq-g"></pre>
  </div>

</div>

<!-- ==================== SCRIPT ==================== -->
<script src="script.js" defer></script>

</body>
</html>
