<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <!-- Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Decodificador BCD a 7 segmentos</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- ==================== TÍTULO ==================== -->
<h1>Decodificador BCD → 7 Segmentos</h1>
<p><strong>Tipo de display:</strong> Cátodo común (1 = encendido)</p>

<!-- ==================== SWITCHES ==================== -->
<div class="switches">
  <label for="A">A</label>
  <input type="checkbox" id="A">
  
  <label for="B">B</label>
  <input type="checkbox" id="B">
  
  <label for="C">C</label>
  <input type="checkbox" id="C">

  <label for="D">D</label>
  <input type="checkbox" id="D">
</div>

<!-- ==================== VALOR ==================== -->
<h2>Número: <span id="valor">0</span></h2>

<!-- ==================== DISPLAY ==================== -->
<div class="display">
  <div id="a" class="segment a"></div>
  <div id="b" class="segment b"></div>
  <div id="c" class="segment c"></div>
  <div id="d" class="segment d"></div>
  <div id="e" class="segment e"></div>
  <div id="f" class="segment f"></div>
  <div id="g" class="segment g"></div>
</div>


<!-- ==================== PANEL SVG + ECUACIONES ==================== -->
<div class="paneles">

<!-- ==================== CIRCUITO SVG ==================== -->
<div class="svg-box">
<svg viewBox="0 0 800 400" aria-label="Circuito lógico del segmento a">

<!-- ===== ENTRADAS ===== -->
<text x="20" y="50">A</text>
<line id="wire-A" x1="40" y1="45" x2="300" y2="45" stroke="#555" stroke-width="3"/>

<text x="20" y="100">B</text>
<line id="wire-B" x1="40" y1="95" x2="150" y2="95" stroke="#555" stroke-width="3"/>

<text x="20" y="150">C</text>
<line id="wire-C" x1="40" y1="145" x2="300" y2="145" stroke="#555" stroke-width="3"/>

<text x="20" y="200">D</text>
<line id="wire-D" x1="40" y1="195" x2="150" y2="195" stroke="#555" stroke-width="3"/>

<!-- ===== NOT B ===== -->
<rect id="notB" x="150" y="80" width="50" height="30" fill="#222" stroke="#888"/>
<text x="160" y="100" fill="white">NOT</text>

<!-- ===== NOT D ===== -->
<rect id="notD" x="150" y="180" width="50" height="30" fill="#222" stroke="#888"/>
<text x="160" y="200" fill="white">NOT</text>

<!-- ===== AND BD ===== -->
<rect id="andBD" x="300" y="70" width="60" height="40" fill="#222" stroke="#888"/>
<text x="310" y="95" fill="white">AND</text>

<!-- ===== AND !B!D ===== -->
<rect id="andNotBD" x="300" y="160" width="60" height="40" fill="#222" stroke="#888"/>
<text x="310" y="185" fill="white">AND</text>

<!-- ===== OR FINAL ===== -->
<rect id="orA" x="500" y="100" width="80" height="60" fill="#222" stroke="#888"/>
<text x="520" y="135" fill="white">OR</text>

<!-- ===== CONEXIONES ===== -->
<line id="wire-BD" x1="360" y1="90" x2="500" y2="120" stroke="#555" stroke-width="3"/>
<line id="wire-notBD" x1="360" y1="180" x2="500" y2="140" stroke="#555" stroke-width="3"/>

<line id="wire-A2" x1="300" y1="45" x2="500" y2="110" stroke="#555" stroke-width="3"/>
<line id="wire-C2" x1="300" y1="145" x2="500" y2="150" stroke="#555" stroke-width="3"/>

<!-- SALIDA -->
<line id="wire-out-a" x1="580" y1="130" x2="700" y2="130" stroke="#555" stroke-width="3"/>
<text x="710" y="135">a</text>

</svg>
</div>

<!-- ==================== ECUACIONES ==================== -->
<div class="ecuaciones">
  <h2>Ecuaciones Booleanas</h2>

  <pre id="eq-a"></pre>
  <pre id="eq-b"></pre>
  <pre id="eq-c"></pre>
  <pre id="eq-d"></pre>
  <pre id="eq-e"></pre>
  <pre id="eq-f"></pre>
  <pre id="eq-g"></pre>
</div>

</div>

<!-- ==================== SCRIPT ==================== -->
<script src="script.js" defer></script>

</body>
</html>
